<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Motion Detection</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --bg: #050810;
    --panel: #0a0f1e;
    --border: #1a2a4a;
    --accent: #00d4ff;
    --accent2: #00ff88;
    --danger: #ff2d55;
    --text: #c8d8f0;
    --grid: rgba(0, 100, 255, 0.06);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 50px 50px;
  }
  .login-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 360px;
    box-shadow: 0 0 60px rgba(0,100,255,0.1);
    text-align: center;
  }
  .lock-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, #001440, #003080);
    border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: var(--accent);
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,212,255,0.3);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 30px rgba(0,212,255,0.3); }
    50% { box-shadow: 0 0 50px rgba(0,212,255,0.6); }
  }
  h2 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #4a6080; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
  .input-group { position: relative; margin-bottom: 20px; }
  .input-group i {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: #4a6080; font-size: 14px; pointer-events: none;
  }
  .input-group input {
    width: 100%; padding: 12px 14px 12px 40px;
    background: rgba(0,20,60,0.5); border: 1px solid var(--border);
    border-radius: 8px; color: #fff; font-family: 'Exo 2', sans-serif;
    font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--accent); }
  .btn-login {
    width: 100%; padding: 13px;
    background: linear-gradient(90deg, #003080, #0066cc);
    border: none; border-radius: 8px; color: #fff;
    font-family: 'Exo 2', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 2px; text-transform: uppercase;
    transition: all 0.2s; box-shadow: 0 4px 20px rgba(0,100,255,0.3);
  }
  .btn-login:hover { background: linear-gradient(90deg, #0040a0, #0088ff); transform: translateY(-1px); }
  .error {
    background: rgba(255,45,85,0.1); border: 1px solid var(--danger);
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; color: var(--danger); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .back-link { display: block; margin-top: 20px; font-size: 13px; color: #4a6080; text-decoration: none; transition: color 0.2s; }
  .back-link:hover { color: var(--accent); }
  .default-hint { margin-top: 16px; padding: 10px; background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.1); border-radius: 6px; font-size: 12px; color: #4a6080; }
  .default-hint span { font-family: 'Share Tech Mono'; color: var(--accent); }
</style>
</head>
<body>
<div class="login-box">
  <div class="lock-icon"><i class="fas fa-shield-halved"></i></div>
  <h2>Admin Access</h2>
  <div class="subtitle">Motion Detection System</div>
  {% if error %}
  <div class="error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" name="password" placeholder="Admin Password" autofocus required>
    </div>
    <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Login</button>
  </form>
  <div class="default-hint">Default password: <span>admin123</span><br>(Change in settings)</div>
  <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
</div>
</body>
</html>
